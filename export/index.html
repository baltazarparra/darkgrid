<!--
	Loader inicial do caipora — shell HTML custom do export Web.
	Base: misc/dist/html/full-size.html do Godot 4.6.3-stable (manter a lógica
	de boot/erro do engine intacta ao atualizar a versão do Godot).

	A composição replica assets/sprites/boot_splash.png num palco 16:9 contido
	(mesmas posições relativas), então o handoff loader -> boot splash -> menu
	acontece sem costura. Os PNGs da marca são embutidos em base64 pelos blocos
	GEN_BRAND — regenerados por scripts/tools/gen_brand.py, NUNCA à mão.
-->

html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: #c9d1d9;
	background-color: #0d1117;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status {
	position: absolute;
	left: 0;
	right: 0;
	top: 0;
	bottom: 0;
	background-color: #0d1117;
	display: flex;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

/* Palco 16:9 contido — espelho do boot_splash.png (1280x720). */
#brand-stage {
	position: relative;
	aspect-ratio: 16 / 9;
	width: 100vw;
	max-height: 100vh;
	max-width: calc(100vh * 16 / 9);
}

/* Safari iOS: barra de URL come o vh — dvh mantém o palco centrado de fato */
@supports (height: 100dvh) {
	#brand-stage {
		max-height: 100dvh;
		max-width: calc(100dvh * 16 / 9);
	}
}

#brand-stage img {
	position: absolute;
	image-rendering: pixelated;
	-webkit-user-select: none;
	user-select: none;
	pointer-events: none;
}

/* rosto-marca: 256/1280 de largura, topo em 150/720 (= boot_splash.py) */
#brand-mark-open, #brand-mark-blink {
	left: 40%;
	top: 20.833%;
	width: 20%;
}

/* a mata olha de volta: piscadas irregulares enquanto carrega */
#brand-mark-blink {
	opacity: 0;
	animation: caipora-blink 4.7s linear infinite;
}

@keyframes caipora-blink {
	0%, 38.9% { opacity: 0; }
	39%, 41.7% { opacity: 1; }
	41.8%, 80.9% { opacity: 0; }
	81%, 83.5% { opacity: 1; }
	83.6%, 100% { opacity: 0; }
}

/* wordmark: 512/1280 de largura, topo em 430/720 */
#brand-wordmark {
	left: 30%;
	top: 59.722%;
	width: 40%;
}

/* barra brutal: cantos duros, trilho no breu, brasa preenchendo */
#status-progress {
	display: none;
	position: absolute;
	left: 35%;
	top: 87%;
	width: 30%;
	height: 1.6%;
	-webkit-appearance: none;
	appearance: none;
	background-color: #000000;
	border: 1px solid #1a120a;
	border-radius: 0;
}

#status-progress::-webkit-progress-bar {
	background-color: #000000;
	border-radius: 0;
}

#status-progress::-webkit-progress-value {
	background-color: #ff4500;
	border-radius: 0;
}

#status-progress::-moz-progress-bar {
	background-color: #ff4500;
	border-radius: 0;
}

#status-text {
	display: none;
	position: absolute;
	left: 0;
	right: 0;
	top: 90.5%;
	text-align: center;
	font-family: 'Courier New', monospace;
	font-size: clamp(10px, 1.6vmin, 16px);
	letter-spacing: 0.35em;
	color: #c9d1d9;
	opacity: 0.75;
	animation: respira 2.6s ease-in-out infinite;
}

@keyframes respira {
	0%, 100% { opacity: 0.45; }
	50% { opacity: 0.85; }
}

/* erro: a mata rejeitou o carregamento — sem enfeite, sem canto redondo */
#status-notice {
	display: none;
	position: absolute;
	left: 50%;
	top: 50%;
	transform: translate(-50%, -50%);
	max-width: min(80vw, 560px);
	background-color: #0d1117;
	border: 1px solid #8b0000;
	border-radius: 0;
	color: #c9d1d9;
	font-family: 'Courier New', monospace;
	line-height: 1.4;
	overflow: hidden;
	padding: 1rem 1.25rem;
	text-align: center;
	z-index: 1;
}

#status-notice .notice-title {
	color: #8b0000;
	display: block;
	letter-spacing: 0.2em;
	margin-bottom: 0.6rem;
	text-transform: lowercase;
}

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":4607072,"index.wasm":37700666},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusText = document.getElementById('status-text');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusText.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const title = document.createElement('span');
		title.className = 'notice-title';
		title.textContent = 'a mata rejeitou o carregamento';
		statusNotice.appendChild(title);
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('Erro desconhecido.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Recursos necessários para rodar na Web estão ausentes:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
