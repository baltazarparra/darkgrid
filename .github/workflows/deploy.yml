name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/godot
          key: godot-4.6.3-stable-linux

      - name: Download Godot 4.6.3
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mkdir -p ~/.local/bin
          mv Godot_v4.6.3-stable_linux.x86_64 ~/.local/bin/godot
          chmod +x ~/.local/bin/godot

      - name: Add Godot to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Import project resources
        run: ~/.local/bin/godot --headless --import --path . 2>&1 || true

      - name: Run gate (smoke + GUT)
        run: make gate

  build:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/godot
          key: godot-4.6.3-stable-linux

      - name: Download Godot 4.6.3
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mkdir -p ~/.local/bin
          mv Godot_v4.6.3-stable_linux.x86_64 ~/.local/bin/godot
          chmod +x ~/.local/bin/godot
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.3.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/4.6.3.stable/

      - name: Import project resources
        run: ~/.local/bin/godot --headless --import --path . 2>&1 || true

      - name: Export HTML5
        run: make export

      # Landing page na raiz + jogo em /play/
      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/play
          cp -r site/* deploy/
          cp -r export/* deploy/play/
          touch deploy/.nojekyll

      # Nota: o PWA nativo do Godot (progressive_web_app/enabled) gera o próprio
      # service worker (index.service.worker.js), que cacheia o jogo (offline) e
      # injeta os headers de cross-origin isolation. Por isso NÃO injetamos mais o
      # coi-serviceworker.js: dois service workers no mesmo escopo conflitam.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
